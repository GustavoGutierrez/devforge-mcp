name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to release or republish (for example v2.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve release metadata and validate
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            git fetch --tags --force
            git rev-parse "$TAG" >/dev/null 2>&1 || {
              echo "Tag ${TAG} does not exist on the repository." >&2
              exit 1
            }
            git checkout "$TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "Release tags must start with 'v'. Got: $TAG" >&2
              exit 1
              ;;
          esac

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release prerequisites
        shell: bash
        run: |
          set -euo pipefail

          test "$(tr -d '[:space:]' < VERSION)" = "${{ steps.meta.outputs.version }}"
          go test ./...
          ruby -c packaging/homebrew/Formula/devforge.rb

  build-linux-amd64:
    name: Build Linux amd64 bundle
    runs-on: ubuntu-22.04
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux runtime bundle
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          OUTPUT_DIR: ${{ runner.temp }}/release
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          bash scripts/package_release_bundle.sh \
            --version "$VERSION" \
            --target-os linux \
            --target-arch amd64 \
            --output-dir "$OUTPUT_DIR"

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: devforge-linux-amd64
          path: ${{ runner.temp }}/release/devforge_${{ needs.prepare.outputs.version }}_linux_amd64.tar.gz

  build-darwin-arm64:
    name: Build macOS arm64 bundle
    runs-on: macos-14
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build macOS runtime bundle
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          OUTPUT_DIR: ${{ runner.temp }}/release
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          bash scripts/package_release_bundle.sh \
            --version "$VERSION" \
            --target-os darwin \
            --target-arch arm64 \
            --output-dir "$OUTPUT_DIR"

      - name: Upload macOS bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: devforge-darwin-arm64
          path: ${{ runner.temp }}/release/devforge_${{ needs.prepare.outputs.version }}_darwin_arm64.tar.gz

  release:
    name: Publish GitHub release assets
    runs-on: ubuntu-22.04
    needs:
      - prepare
      - build-linux-amd64
      - build-darwin-arm64
    outputs:
      tag: ${{ needs.prepare.outputs.tag }}
      version: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/artifacts

      - name: Collect release files
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          OUTPUT_DIR: ${{ runner.temp }}/release
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$OUTPUT_DIR"
          cp "${{ runner.temp }}/artifacts/devforge-linux-amd64/devforge_${VERSION}_linux_amd64.tar.gz" "$OUTPUT_DIR/"
          cp "${{ runner.temp }}/artifacts/devforge-darwin-arm64/devforge_${VERSION}_darwin_arm64.tar.gz" "$OUTPUT_DIR/"
          cd "$OUTPUT_DIR"
          sha256sum \
            "devforge_${VERSION}_linux_amd64.tar.gz" \
            "devforge_${VERSION}_darwin_arm64.tar.gz" \
            > checksums.txt

      - name: Remove existing release assets for reruns
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release $TAG does not exist yet; nothing to clean up."
            exit 0
          fi

          for asset in \
            "checksums.txt" \
            "devforge_${VERSION}_linux_amd64.tar.gz" \
            "devforge_${VERSION}_darwin_arm64.tar.gz"
          do
            gh release delete-asset "$TAG" "$asset" --repo "${GITHUB_REPOSITORY}" --yes || true
          done

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 0
          fi

          gh release create "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "DevForge $TAG" \
            --notes "Automated DevForge release bundle for Linux amd64 and macOS arm64."

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          OUTPUT_DIR: ${{ runner.temp }}/release
        shell: bash
        run: |
          set -euo pipefail

          gh release upload "$TAG" \
            "$OUTPUT_DIR/devforge_${{ needs.prepare.outputs.version }}_linux_amd64.tar.gz" \
            "$OUTPUT_DIR/devforge_${{ needs.prepare.outputs.version }}_darwin_arm64.tar.gz" \
            "$OUTPUT_DIR/checksums.txt" \
            --clobber \
            --repo "${GITHUB_REPOSITORY}"

  publish-homebrew-tap:
    name: Publish Homebrew tap repository
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download checksums from GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          gh release download "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "checksums.txt" \
            --output "$RUNNER_TEMP/checksums.txt" \
            --clobber

      - name: Verify tap publishing configuration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.HOMEBREW_TAP_SSH_KEY }}" ]; then
            echo "HOMEBREW_TAP_SSH_KEY is required to publish Formula/devforge.rb to GustavoGutierrez/homebrew-devforge." >&2
            echo "Create a write-enabled deploy key for GustavoGutierrez/homebrew-devforge and save the private key as a repository secret." >&2
            exit 1
          fi

      - name: Render Homebrew formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          CHECKSUMS_FILE: ${{ runner.temp }}/checksums.txt
          OUTPUT_FILE: ${{ runner.temp }}/devforge.rb
        shell: bash
        run: |
          set -euo pipefail

          python3 scripts/render_homebrew_formula.py \
            --template packaging/homebrew/Formula/devforge.rb \
            --version "$VERSION" \
            --checksums-file "$CHECKSUMS_FILE" \
            --output "$OUTPUT_FILE"

      - name: Validate rendered formula syntax
        env:
          FORMULA_FILE: ${{ runner.temp }}/devforge.rb
        run: ruby -c "$FORMULA_FILE"

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: GustavoGutierrez/homebrew-devforge
          ssh-key: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
          path: homebrew-devforge

      - name: Publish tap repository contents
        env:
          TAG: ${{ needs.release.outputs.tag }}
          FORMULA_FILE: ${{ runner.temp }}/devforge.rb
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "homebrew-devforge/Formula"
          cp packaging/homebrew/README.md "homebrew-devforge/README.md"
          cp packaging/homebrew/RELEASE_PROCESS.md "homebrew-devforge/RELEASE_PROCESS.md"
          cp "$FORMULA_FILE" "homebrew-devforge/Formula/devforge.rb"

          git -C "homebrew-devforge" add README.md RELEASE_PROCESS.md Formula/devforge.rb

          if git -C "homebrew-devforge" diff --cached --quiet; then
            echo "Homebrew tap repository already up to date"
            exit 0
          fi

          git -C "homebrew-devforge" \
            -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m "Update DevForge Homebrew formula for $TAG"

          git -C "homebrew-devforge" push origin HEAD
