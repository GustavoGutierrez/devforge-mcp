  # ── Prepare release ─────────────────────────────────────────────────────────
  # Creates the GitHub release within this workflow so the GITHUB_TOKEN
  # (which uploads the asset) has write permissions over it.
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create release if not exists
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.TAG }}
          BODY: "Linux amd64 bottle for v${{ steps.version.outputs.VERSION }}. See the [releases page](https://github.com/${{ github.repository }}/releases) for all assets."
        run: |
          # Check if release already exists
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists — fetching its upload URL"
            UPLOAD_URL=$(gh api \
              "repos/${{ github.repository }}/releases/tags/$TAG" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
            echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT
          else
            echo "Release $TAG does not exist — creating it"
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "DevForge $TAG" \
              --body "$BODY"
            UPLOAD_URL=$(gh api \
              "repos/${{ github.repository }}/releases/tags/$TAG" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
            echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT
          fi

  # ── Build Linux bottle ──────────────────────────────────────────────────────
  build-linux:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    needs: [prepare-release]
    outputs:
      sha256: ${{ steps.sha256.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Download modules (with native libs)
        run: go mod download

      - name: Read version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build devforge-mcp (linux)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          CGO_ENABLED=1 go build \
            -ldflags="-s -w" \
            -o devforge-mcp \
            ./cmd/devforge-mcp/

      - name: Build devforge (linux)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          CGO_ENABLED=1 go build \
            -ldflags="-s -w" \
            -o devforge \
            ./cmd/devforge/

      - name: Download dpf (Linux binary)
        run: |
          mkdir -p dist
          cp devforge-mcp devforge dist/
          DPF_URL="https://github.com/GustavoGutierrez/devpixelforge/releases/download/v${DPF_VERSION}/dpf"
          curl -sSL --fail -o dist/dpf "$DPF_URL"
          chmod +x dist/dpf

      - name: Create bottle archive
        id: archive
        run: |
          ARCHIVE="devforge-${{ steps.version.outputs.VERSION }}.linux-amd64.tar.gz"
          tar -czf "$ARCHIVE" dist/
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.TAG }}
          ARCHIVE: ${{ steps.archive.outputs.ARCHIVE }}
        run: |
          # gh release upload supports --clobber to overwrite existing assets.
          gh release upload "$TAG" "$ARCHIVE" --clobber --repo "${{ github.repository }}"

      - name: Compute sha256
        id: sha256
        run: |
          SHA256=$(sha256sum "${{ steps.archive.outputs.ARCHIVE }}" | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256"

  # ── Update formula ──────────────────────────────────────────────────────────
  update-formula:
    name: Update Homebrew formula
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Compute source tarball sha256
        id: source
        run: |
          SOURCE_URL="https://github.com/GustavoGutierrez/devforge-mcp/archive/refs/tags/v${{ steps.version.outputs.VERSION }}.tar.gz"
          curl -sSL --fail -o /tmp/source.tar.gz "$SOURCE_URL"
          SOURCE_SHA256=$(sha256sum /tmp/source.tar.gz | cut -d' ' -f1)
          echo "source_sha256=$SOURCE_SHA256" >> $GITHUB_OUTPUT
          echo "source_sha256=$SOURCE_SHA256"

      - name: Checkout homebrew-tap branch
        uses: actions/checkout@v4
        with:
          ref: homebrew-tap
          path: homebrew-tap
          fetch-depth: 1
          set-safe-directory: true

      - name: Check if branch exists, create if not
        run: |
          # Ensure remote URL is set (actions/checkout with path: may not preserve it)
          git remote set-url origin "https://github.com/${{ github.repository }}.git"
          git checkout homebrew-tap || git checkout -b homebrew-tap
          git pull origin homebrew-tap --ff-only || true
        working-directory: homebrew-tap

      - name: Download linux asset
        id: linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: homebrew-tap
        run: |
          gh release download v${{ steps.version.outputs.VERSION }} \
            --pattern "*.linux-amd64.tar.gz" \
            -D /tmp/linux/ \
            --clobber
          SHA256=$(sha256sum /tmp/linux/*.linux-amd64.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256"

      - name: Update Formula/devforge.rb
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG: ${{ steps.version.outputs.TAG }}
          LINUX_SHA256: ${{ needs.build-linux.outputs.sha256 }}
          SOURCE_SHA256: ${{ steps.source.outputs.source_sha256 }}
        working-directory: homebrew-tap
        run: |
          mkdir -p Formula
          # Write the formula — Linux only (macOS pending build fixes).
          # Single-quoted heredoc prevents shell expansion of Ruby's #{version}.
          cat > Formula/devforge.rb << 'RUBY_EOF'
          # frozen_string_literal: true

          class Devforge < Formula
            desc "DevForge — Design intelligence (CLI/TUI + MCP server) + image/video/audio processing (dpf)"
            homepage "https://github.com/GustavoGutierrez/devforge-mcp"
            license "GPL-3.0"

            url "https://github.com/GustavoGutierrez/devforge-mcp/archive/refs/tags/v#{version}.tar.gz"
            version "#{version}"
            sha256 "SOURCE_PLACEHOLDER"

            if OS.linux?
              on_linux do
                url "https://github.com/GustavoGutierrez/devforge-mcp/releases/download/v#{version}/devforge-#{version}.linux-amd64.tar.gz"
                sha256 "LINUX_PLACEHOLDER"
              end
            end
          RUBY_EOF

          sed -i "s/SOURCE_PLACEHOLDER/${SOURCE_SHA256}/" Formula/devforge.rb
          sed -i "s/LINUX_PLACEHOLDER/${LINUX_SHA256}/" Formula/devforge.rb

          echo "Formula updated with sha256:"
          echo "  source: ${SOURCE_SHA256}"
          echo "  linux:  ${LINUX_SHA256}"

      - name: Commit and push
        run: |
          # The .git directory is inside homebrew-tap/ (where actions/checkout cloned to).
          # cd into it so git commands find .git.
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create a new branch for the PR (not a direct push to homebrew-tap).
          git checkout -b "update-v${{ steps.version.outputs.VERSION }}"
          git add Formula/devforge.rb
          git diff --staged --quiet && echo "No changes — skipping commit" && exit 0
          git commit -m "chore(homebrew): update bottles for v${{ steps.version.outputs.VERSION }}"
          git push origin "update-v${{ steps.version.outputs.VERSION }}"

      - name: Open PR
        # Run from homebrew-tap/ where .git lives (actions/checkout with path: homebrew-tap).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: homebrew-tap
        run: |
          cat > /tmp/pr_body.md << 'PRBODY'
          ## Homebrew Bottles — v{{ VERSION }}

          Linux bottle built and uploaded.

          | Architecture | sha256 |
          |-------------|--------|
          | linux (x86_64) | `{{ SHA256 }}` |

          **After merging, users can install with:**
          ```bash
          brew update
          brew upgrade devforge
          ```
          PRBODY
          sed "s/{{ VERSION }}/${{ steps.version.outputs.VERSION }}/g; s/{{ SHA256 }}/${{ needs.build-linux.outputs.sha256 }}/g" /tmp/pr_body.md > /tmp/pr_body_expanded.md
          gh pr create \
            --repo "${{ github.repository }}" \
            --base "homebrew-tap" \
            --head "homebrew-tap/update-v${{ steps.version.outputs.VERSION }}" \
            --title "chore(homebrew): update bottles for v${{ steps.version.outputs.VERSION }}" \
            --body-file /tmp/pr_body_expanded.md
